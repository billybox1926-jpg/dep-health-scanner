name: Reusable Quality Checks

on:
  workflow_call:
    inputs:
      checkout-fetch-depth:
        description: Git checkout fetch depth.
        required: false
        default: 0
        type: number
      run-hygiene-check:
        description: Run generic repository hygiene checks.
        required: false
        default: true
        type: boolean
      run-format-check:
        description: Run formatting validation command.
        required: false
        default: true
        type: boolean
      run-lint:
        description: Run lint command.
        required: false
        default: true
        type: boolean
      run-test:
        description: Run automated tests.
        required: false
        default: true
        type: boolean

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.checkout-fetch-depth }}

      - name: Repository hygiene
        if: ${{ inputs.run-hygiene-check }}
        shell: bash
        run: bash scripts/hygiene.sh

      # --- Rust toolchain ---
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust format check
        if: ${{ inputs.run-format-check }}
        shell: bash
        run: cargo fmt -- --check

      - name: Rust lint
        if: ${{ inputs.run-lint }}
        shell: bash
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust test
        if: ${{ inputs.run-test }}
        shell: bash
        run: cargo test --all-targets

      # --- Python toolchain ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Python format check
        if: ${{ inputs.run-format-check }}
        shell: bash
        run: ruff format --check src/

      - name: Python lint
        if: ${{ inputs.run-lint }}
        shell: bash
        run: ruff check src/

      - name: Python test
        if: ${{ inputs.run-test }}
        shell: bash
        run: pytest -v
